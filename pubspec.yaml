name: pgh_app
description: Parlamento Global Hispano — Agenda de Eventos Hispanos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  image: ^4.0.0
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  timeago: ^3.6.1
  intl: ^0.20.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  envied: ^0.5.4
  http: ^1.2.0
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  envied_generator: ^0.5.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/ponentes/
