name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate env
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: flutter build web --release

      - name: Deploy via LFTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          cat > /tmp/deploy.lftp << EOF
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data false
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set net:timeout 60
          set net:max-retries 3
          open -u "${FTP_USER},${FTP_PASS}" ftps://${FTP_HOST}
          mirror --reverse --delete --parallel=2 --verbose build/web/ /
          bye
          EOF
          lftp -f /tmp/deploy.lftp
