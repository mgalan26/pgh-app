name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        shell: pwsh
        run: |
          "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" | Set-Content .env
          "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" | Add-Content .env
          "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" | Add-Content .env
          "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" | Add-Content .env

      - name: Install dependencies
        shell: pwsh
        run: flutter pub get

      - name: Generate env
        shell: pwsh
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        shell: pwsh
        run: flutter build web --release

      - name: Deploy via PHP webhook
        shell: pwsh
        run: |
          $zipPath = "$env:TEMP\deploy.zip"
          Compress-Archive -Path build\web\* -DestinationPath $zipPath -Force
          $bytes = [System.IO.File]::ReadAllBytes($zipPath)
          Invoke-RestMethod -Uri "https://agenda.appgh.net/deploy.php" `
            -Method POST `
            -Headers @{ "X-Deploy-Token" = "${{ secrets.DEPLOY_TOKEN }}" } `
            -Body $bytes `
            -ContentType "application/octet-stream"
