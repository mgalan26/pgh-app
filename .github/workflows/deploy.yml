name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        shell: bash
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env

      - name: Install dependencies
        shell: bash
        run: flutter pub get

      - name: Generate env
        shell: bash
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        shell: bash
        run: flutter build web --release

      - name: Deploy via PHP webhook
        shell: bash
        run: |
          cd build/web
          zip -r "$TEMP/deploy.zip" .
          curl -f -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            --data-binary @"$TEMP/deploy.zip" \
            https://agenda.appgh.net/deploy.php
